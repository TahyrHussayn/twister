# Pre-approve build scripts for the packages C3 itself installs that need
# them: `workerd` downloads the platform binary, `esbuild` and `sharp`
# (via miniflare) download/build native bindings. Without these, pnpm 11+
# aborts the install with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  workerd: true
  sharp: true
  vite-plus: true
  "@voidzero-dev/vite-plus-core": true
  "@voidzero-dev/vite-plus-linux-x64-gnu": true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
